<div style="font-family: sans-serif; padding: 2rem;">
  <h2>Sistema de Lockers CUUT</h2>

  <label for="cuenta">Numero de Cuenta:</label>
  <input
    id="cuenta"
    type="text"
    [(ngModel)]="numeroCuenta"
    placeholder="Coloca tu numero de cuenta"
  />
  <br /><br />

  <button type="button" (click)="ingresar()">Ingresar al Sistema</button>
</div>
